
<style>
:root{--brand:#0099ff;--brand-bg:rgba(0,153,255,0.10);--brand-bg2:rgba(0,153,255,0.06);--success:#10b981;--danger:#ef4444;--warn:#f59e0b}
.app{position:relative;display:flex;height:760px;overflow:hidden;background:var(--color-background-tertiary);font-family:var(--font-sans)}
.sidebar{width:200px;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;padding:12px 0;flex-shrink:0}
.main{flex:1;overflow-y:auto;min-width:0}
.main::-webkit-scrollbar{width:4px}.main::-webkit-scrollbar-thumb{background:var(--color-border-tertiary);border-radius:2px}
.topbar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:5}

.nav-btn.active{background:var(--brand-bg);color:var(--brand);font-weight:500}
.action-btn{display:flex;flex-direction:column;align-items:center;gap:6px;border:none;background:none;cursor:pointer;padding:4px 8px}
.action-btn .icon-wrap{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;transition:filter 0.15s}
.action-btn:hover .icon-wrap{filter:brightness(1.1)}
.action-btn span{font-size:11px;color:var(--color-text-secondary);white-space:nowrap}
.crypto-card{flex-shrink:0;width:138px;padding:14px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:14px;cursor:pointer;text-align:left;transition:border-color 0.15s;user-select:none}
.crypto-card:hover{border-color:var(--color-border-secondary)}
.all-card{flex-shrink:0;width:120px;padding:14px;border:0.5px solid var(--brand);border-radius:14px;cursor:pointer;background:var(--brand-bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;user-select:none;transition:background 0.15s}
.all-card:hover{background:var(--brand-bg)}
.txn-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.txn-row:last-child{border-bottom:none}
.modal-overlay{position:absolute;inset:0;z-index:30;background:rgba(0,0,0,0.55);display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--color-background-primary);border-radius:20px 20px 0 0;width:100%;max-height:88%;overflow-y:auto;animation:slideUp 0.2s ease}
.modal-sheet::-webkit-scrollbar{width:4px}.modal-sheet::-webkit-scrollbar-thumb{background:var(--color-border-tertiary);border-radius:2px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{display:flex;justify-content:center;padding:10px 0 2px}
.modal-handle div{width:36px;height:4px;border-radius:2px;background:var(--color-border-secondary)}
.modal-header{display:flex;align-items:center;padding:12px 20px 14px;border-bottom:0.5px solid var(--color-border-tertiary)}
.modal-header h3{flex:1;font-size:16px;font-weight:500;margin:0;color:var(--color-text-primary)}
.icon-btn{width:28px;height:28px;border-radius:50%;border:none;background:var(--color-background-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--color-text-secondary)}
.inp{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:11px 14px;color:var(--color-text-primary);font-size:15px;font-weight:500;outline:none;width:100%;box-sizing:border-box}
.inp:focus{border-color:var(--brand)}
.sel{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:11px 14px;color:var(--color-text-primary);font-size:14px;font-weight:500;outline:none;width:100%;cursor:pointer;box-sizing:border-box}
.primary-btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--brand);color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:opacity 0.15s}
.primary-btn:disabled{opacity:0.4;cursor:default}
.ghost-btn{width:100%;padding:13px;border-radius:12px;border:0.5px solid var(--color-border-secondary);background:none;color:var(--color-text-primary);font-size:14px;font-weight:500;cursor:pointer}
.tag-btn{padding:7px 0;border-radius:8px;border:0.5px solid var(--color-border-tertiary);background:none;color:var(--color-text-secondary);font-size:12px;cursor:pointer;transition:background 0.15s}
.tag-btn.active{background:var(--brand-bg);border-color:var(--brand);color:var(--brand)}
.tag-btn:hover:not(.active){background:var(--color-background-secondary)}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:9px 12px;margin-bottom:12px}
.search-bar input{background:none;border:none;outline:none;color:var(--color-text-primary);font-size:14px;flex:1}
.list-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;border:none;background:none;width:100%;text-align:left}
.list-row:last-child{border-bottom:none}
.list-row:hover{background:var(--color-background-secondary);border-radius:8px;padding:12px 6px;margin:0 -6px;width:calc(100% + 12px)}
.bnav{display:none;position:absolute;bottom:0;left:0;right:0;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);padding:6px 0 10px}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:4px 0;color:var(--color-text-secondary);font-size:10px;transition:color 0.15s}
.bnav-btn.active{color:var(--brand)}
.balance-legend{display:flex;flex-direction:column;gap:9px;flex:1}

.logo-mark{width:32px;height:32px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:500;flex-shrink:0}
.stat-pill{display:flex;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)}
@media(max-width:700px){
  .sidebar{display:none}
  .bnav{display:flex}
  .desktop-only{display:none!important}
  .mobile-balance{display:flex!important}
  .main{padding-bottom:70px}
}
@media(min-width:701px){
  .mobile-only{display:none!important}
  .mobile-balance{display:none}
}
</style>

<div id="root"></div>

<script type="module">
import { createElement as h, useState, useEffect } from "https://esm.sh/react@18";
import { createRoot } from "https://esm.sh/react-dom@18/client";

const PRICES={BTC:67245,ETH:3742,SOL:185.20,BNB:612.50,XRP:0.6234,ADA:0.4821,DOT:8.34,AVAX:38.92,MATIC:0.8821,LINK:14.23,UNI:8.45,ATOM:9.21,DOGE:0.1825,LTC:84.32,SHIB:0.00002345,FTM:0.7823,NEAR:6.43,ALGO:0.2134,VET:0.0423,ICP:12.45};
const CRYPTOS=[
  {sym:"BTC",name:"Bitcoin",color:"#F7931A",icon:"₿",chg:2.34},
  {sym:"ETH",name:"Ethereum",color:"#627EEA",icon:"Ξ",chg:1.87},
  {sym:"SOL",name:"Solana",color:"#9945FF",icon:"◎",chg:-3.12},
  {sym:"BNB",name:"BNB",color:"#F3BA2F",icon:"B",chg:0.95},
  {sym:"XRP",name:"XRP",color:"#00AAE4",icon:"✕",chg:-1.45},
  {sym:"ADA",name:"Cardano",color:"#6366F1",icon:"₳",chg:0.23},
  {sym:"DOT",name:"Polkadot",color:"#E6007A",icon:"●",chg:-0.87},
  {sym:"AVAX",name:"Avalanche",color:"#E84142",icon:"△",chg:3.21},
  {sym:"MATIC",name:"Polygon",color:"#8247E5",icon:"M",chg:1.54},
  {sym:"LINK",name:"Chainlink",color:"#2A5ADA",icon:"⬡",chg:-2.13},
  {sym:"UNI",name:"Uniswap",color:"#FF007A",icon:"U",chg:4.67},
  {sym:"ATOM",name:"Cosmos",color:"#6B7280",icon:"⚛",chg:0.45},
  {sym:"DOGE",name:"Dogecoin",color:"#C2A633",icon:"D",chg:5.23},
  {sym:"LTC",name:"Litecoin",color:"#A0A0A0",icon:"Ł",chg:-1.23},
  {sym:"SHIB",name:"Shiba Inu",color:"#FF4500",icon:"Ş",chg:7.89},
  {sym:"FTM",name:"Fantom",color:"#1969FF",icon:"F",chg:-4.32},
  {sym:"NEAR",name:"NEAR",color:"#00EC97",icon:"N",chg:2.11},
  {sym:"ALGO",name:"Algorand",color:"#818CF8",icon:"A",chg:-0.54},
  {sym:"VET",name:"VeChain",color:"#15BDFF",icon:"V",chg:1.08},
  {sym:"ICP",name:"ICP",color:"#29ABE2",icon:"∞",chg:-2.67},
];
const gc=sym=>CRYPTOS.find(c=>c.sym===sym)||CRYPTOS[0];
const HOLDINGS={BTC:0.4521,ETH:3.21,SOL:45.5,BNB:12.3,XRP:5200,ADA:3800};
const TXNS=[
  {id:1,type:"deposit",sym:"BTC",amt:0.1,usd:6724.5,date:"Apr 4, 2025"},
  {id:2,type:"swap",from:"ETH",to:"SOL",fAmt:0.5,tAmt:10.12,usd:1871,date:"Apr 3, 2025"},
  {id:3,type:"withdraw",sym:"XRP",amt:500,usd:311.7,date:"Apr 2, 2025"},
  {id:4,type:"deposit",sym:"ETH",amt:1,usd:3742,date:"Apr 1, 2025"},
  {id:5,type:"swap",from:"BNB",to:"BTC",fAmt:2,tAmt:0.0182,usd:1225,date:"Mar 31, 2025"},
  {id:6,type:"withdraw",sym:"SOL",amt:10,usd:1852,date:"Mar 30, 2025"},
];
const MAJOR=["BTC","ETH","SOL","BNB","XRP","ADA","DOT","AVAX","MATIC","LINK"];
const fmtUSD=n=>{if(n>=1e6)return`$${(n/1e6).toFixed(2)}M`;if(n>=1e3)return`$${n.toLocaleString('en',{maximumFractionDigits:2})}`;return`$${n.toFixed(2)}`;};
const fmtC=n=>{if(n>=10000)return n.toLocaleString('en',{maximumFractionDigits:0});if(n>=1)return n.toFixed(2);if(n>=0.001)return n.toFixed(4);return n.toFixed(8);};
const totalUSD=()=>Object.entries(HOLDINGS).reduce((s,[sym,a])=>s+a*(PRICES[sym]||0),0);

// CIcon
const CIcon=({sym,size=40})=>{
  const c=gc(sym);
  return h('div',{style:{width:size,height:size,background:c.color+'18',border:`1.5px solid ${c.color}40`,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:c.color,fontSize:size*0.36,fontWeight:500,flexShrink:0,userSelect:'none'}},c.icon);
};

// DonutChart
const DonutChart=({size=190})=>{
  const T=30,r=(size-T)/2,C=2*Math.PI*r,cx=size/2,cy=size/2;
  const total=totalUSD();
  const items=Object.entries(HOLDINGS).map(([sym,a])=>({sym,usd:a*(PRICES[sym]||0),color:gc(sym).color})).filter(i=>i.usd>0).sort((a,b)=>b.usd-a.usd);
  let cumA=0;
  const segs=items.map(item=>{const pct=item.usd/total;const dash=Math.max(3,pct*C-4);const rot=cumA-90;cumA+=pct*360;return{...item,dash,rot};});
  return h('div',{style:{position:'relative',width:size,height:size,flexShrink:0}},
    h('svg',{width:size,height:size},
      h('circle',{cx,cy,r,fill:'none',stroke:'rgba(128,128,128,0.08)',strokeWidth:T}),
      ...segs.map((s,i)=>h('circle',{key:i,cx,cy,r,fill:'none',stroke:s.color,strokeWidth:T-8,strokeDasharray:`${s.dash} ${C-s.dash}`,transform:`rotate(${s.rot} ${cx} ${cy})`}))
    ),
    h('div',{style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,pointerEvents:'none'}},
      h('div',{style:{fontSize:11,color:'var(--color-text-secondary)'}},'Portfolio'),
      h('div',{style:{fontSize:18,fontWeight:500,color:'var(--color-text-primary)'}},fmtUSD(total)),
      h('div',{style:{fontSize:11,color:'var(--color-text-success)'}},'\u25b2 2.34% today')
    )
  );
};

// Modal base
const Modal=({title,onClose,onBack,children})=>h('div',{className:'modal-overlay',onClick:onClose},
  h('div',{className:'modal-sheet',onClick:e=>e.stopPropagation()},
    h('div',{className:'modal-handle'},h('div',{})),
    h('div',{className:'modal-header'},
      onBack&&h('button',{className:'icon-btn',onClick:onBack,style:{marginRight:8}},'\u2039'),
      h('h3',{},title),
      h('button',{className:'icon-btn',onClick:onClose},'\u00d7')
    ),
    h('div',{style:{padding:'0 20px 24px'}},children)
  )
);

// Crypto Detail Modal
const CryptoModal=({sym,onClose,onConvert,onWithdraw,onReceive})=>{
  const c=gc(sym);const holding=HOLDINGS[sym]||0;const usd=holding*(PRICES[sym]||0);
  return h(Modal,{title:c.name,onClose},
    h('div',{style:{display:'flex',alignItems:'center',gap:14,marginTop:8,marginBottom:20}},
      h(CIcon,{sym,size:56}),
      h('div',{},
        h('div',{style:{fontSize:22,fontWeight:500,color:'var(--color-text-primary)'}},fmtUSD(PRICES[sym]||0)),
        h('div',{style:{fontSize:13,color:c.chg>=0?'var(--color-text-success)':'var(--color-text-danger)',marginTop:2}},`${c.chg>=0?'▲':'▼'} ${Math.abs(c.chg)}% (24h)`)
      )
    ),
    holding>0&&h('div',{style:{background:'var(--color-background-secondary)',borderRadius:12,padding:14,marginBottom:16,border:'0.5px solid var(--color-border-tertiary)'}},
      h('div',{style:{fontSize:12,color:'var(--color-text-secondary)',marginBottom:4}},'Your balance'),
      h('div',{style:{fontSize:20,fontWeight:500,color:'var(--color-text-primary)'}},fmtUSD(usd)),
      h('div',{style:{fontSize:13,color:'var(--color-text-secondary)',marginTop:2}},`${fmtC(holding)} ${sym}`)
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}},
      ...[
        {label:'Withdraw',color:'#ef4444',onClick:()=>onWithdraw(sym)},
        {label:'Receive',color:'#10b981',onClick:()=>onReceive(sym)},
        {label:'Convert',color:'#0099ff',onClick:()=>onConvert(sym)},
      ].map(({label,color,onClick})=>h('button',{key:label,onClick,style:{padding:'14px 0',borderRadius:12,background:color+'18',border:`1px solid ${color}35`,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:7,transition:'background 0.15s'}},
        h('span',{style:{fontSize:16}},label==='Withdraw'?'↑':label==='Receive'?'↓':'↔'),
        h('span',{style:{color,fontSize:12,fontWeight:500}},label)
      ))
    )
  );
};

// All Cryptos Modal
const AllCryptosModal=({onClose,onSelect})=>{
  const [q,setQ]=useState('');
  const list=CRYPTOS.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())||c.sym.toLowerCase().includes(q.toLowerCase()));
  return h(Modal,{title:`All Cryptocurrencies (${CRYPTOS.length})`,onClose},
    h('div',{className:'search-bar'},
      h('span',{style:{fontSize:14,color:'var(--color-text-secondary)'}},'\u2315'),
      h('input',{placeholder:'Search...',value:q,onChange:e=>setQ(e.target.value),style:{background:'none',border:'none',outline:'none',color:'var(--color-text-primary)',fontSize:14,flex:1}})
    ),
    h('div',{style:{maxHeight:400,overflowY:'auto'}},
      list.map((c,i)=>{const hold=HOLDINGS[c.sym]||0;const usd=hold*(PRICES[c.sym]||0);
        return h('button',{key:c.sym,className:'list-row',onClick:()=>onSelect(c.sym)},
          h(CIcon,{sym:c.sym,size:38}),
          h('div',{style:{flex:1}},
            h('div',{style:{fontSize:14,fontWeight:500,color:'var(--color-text-primary)'}},'',c.name),
            h('div',{style:{fontSize:12,color:'var(--color-text-secondary)'}},c.sym)
          ),
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{fontSize:14,fontWeight:500,color:'var(--color-text-primary)'}},fmtUSD(PRICES[c.sym]||0)),
            h('div',{style:{fontSize:12,color:c.chg>=0?'var(--color-text-success)':'var(--color-text-danger)'}},`${c.chg>=0?'+':''}${c.chg}%`)
          )
        );
      })
    )
  );
};

// Swap Modal
const SwapModal=({initFrom='BTC',initTo='ETH',onClose})=>{
  const [from,setFrom]=useState(initFrom);
  const [to,setTo]=useState(initTo===initFrom?'ETH':initTo);
  const [amt,setAmt]=useState('');
  const rate=PRICES[from]&&PRICES[to]?(PRICES[from]/PRICES[to]).toFixed(6):'—';
  const receive=amt&&PRICES[from]&&PRICES[to]?((parseFloat(amt)||0)*PRICES[from]/PRICES[to]).toFixed(6):'';
  const usdVal=amt?fmtUSD((parseFloat(amt)||0)*PRICES[from]):'';
  return h(Modal,{title:'Convert / Swap',onClose},
    h('div',{style:{marginBottom:12}},
      h('div',{style:{fontSize:12,color:'var(--color-text-secondary)',marginBottom:6}},'From'),
      h('div',{style:{display:'flex',alignItems:'center',gap:10,background:'var(--color-background-secondary)',border:'0.5px solid var(--color-border-tertiary)',borderRadius:12,padding:'12px 14px'}},
        h(CIcon,{sym:from,size:34}),
        h('select',{className:'sel',value:from,onChange:e=>setFrom(e.target.value),style:{flex:1,padding:0,border:'none',background:'none',boxSizing:'border-box'}},
          CRYPTOS.map(c=>h('option',{key:c.sym,value:c.sym},`${c.sym} — ${c.name}`))
        ),
        h('input',{type:'number',placeholder:'0.00',value:amt,onChange:e=>setAmt(e.target.value),style:{background:'none',border:'none',outline:'none',color:'var(--color-text-primary)',fontSize:18,fontWeight:500,textAlign:'right',width:90}})
      ),
      (HOLDINGS[from]||0)>0&&h('div',{style:{fontSize:11,color:'var(--color-text-secondary)',marginTop:5,textAlign:'right'}},`Balance: ${fmtC(HOLDINGS[from])} ${from}`)
    ),
    h('div',{style:{display:'flex',justifyContent:'center',marginBottom:12}},
      h('button',{onClick:()=>{const t=from;setFrom(to);setTo(t);},style:{width:36,height:36,borderRadius:'50%',border:'0.5px solid var(--brand)',background:'var(--brand-bg)',cursor:'pointer',fontSize:16,color:'var(--brand)',display:'flex',alignItems:'center',justifyContent:'center'}},'\u21c5')
    ),
    h('div',{style:{marginBottom:18}},
      h('div',{style:{fontSize:12,color:'var(--color-text-secondary)',marginBottom:6}},'To'),
      h('div',{style:{display:'flex',alignItems:'center',gap:10,background:'var(--color-background-secondary)',border:'0.5px solid var(--color-border-tertiary)',borderRadius:12,padding:'12px 14px'}},
        h(CIcon,{sym:to,size:34}),
        h('select',{className:'sel',value:to,onChange:e=>setTo(e.target.value),style:{flex:1,padding:0,border:'none',background:'none',boxSizing:'border-box'}},
          CRYPTOS.filter(c=>c.sym!==from).map(c=>h('option',{key:c.sym,value:c.sym},`${c.sym} — ${c.name}`))
        ),
        h('div',{style:{color:'var(--color-text-secondary)',fontSize:16,fontWeight:500,minWidth:90,textAlign:'right'}},receive||'0.00')
      )
    ),
    amt&&h('div',{style:{background:'var(--color-background-secondary)',borderRadius:10,padding:12,marginBottom:16,border:'0.5px solid var(--color-border-tertiary)',fontSize:12,display:'flex',flexDirection:'column',gap:6}},
      h('div',{style:{display:'flex',justifyContent:'space-between'}},h('span',{style:{color:'var(--color-text-secondary)'}},'Rate'),h('span',{style:{color:'var(--color-text-primary)'}},`1 ${from} = ${rate} ${to}`)),
      h('div',{style:{display:'flex',justifyContent:'space-between'}},h('span',{style:{color:'var(--color-text-secondary)'}},'You send'),h('span',{style:{color:'var(--color-text-primary)'}},`${amt} ${from} ≈ ${usdVal}`)),
      h('div',{style:{display:'flex',justifyContent:'space-between'}},h('span',{style:{color:'var(--color-text-secondary)'}},'You receive'),h('span',{style:{color:'var(--color-text-success)'}},`${receive} ${to}`))
    ),
    h('button',{className:'primary-btn',disabled:!amt||parseFloat(amt)<=0,onClick:onClose},'Preview Swap')
  );
};

// Deposit Modal
const DepositModal=({onClose})=>{
  const [step,setStep]=useState(1);const [sym,setSym]=useState(null);const [usdAmt,setUsdAmt]=useState('');
  const quick=[100,500,1000,5000];
  if(step===1)return h(Modal,{title:'Select Cryptocurrency',onClose},
    h('div',{style:{maxHeight:460,overflowY:'auto'}},
      CRYPTOS.map((c,i)=>h('button',{key:c.sym,className:'list-row',onClick:()=>{setSym(c.sym);setStep(2);}},
        h(CIcon,{sym:c.sym,size:38}),
        h('div',{style:{flex:1}},h('div',{style:{fontSize:14,fontWeight:500,color:'var(--color-text-primary)'}},c.name),h('div',{style:{fontSize:12,color:'var(--color-text-secondary)'}},`${c.sym} · ${fmtUSD(PRICES[c.sym]||0)}`)),
        h('span',{style:{color:'var(--color-text-secondary)',fontSize:18}},'\u203a')
      ))
    )
  );
  return h(Modal,{title:`Deposit ${sym}`,onClose,onBack:()=>setStep(1)},
    h('div',{style:{display:'flex',justifyContent:'center',margin:'12px 0 20px'}},h(CIcon,{sym,size:64})),
    h('div',{style:{marginBottom:16}},
